name: database
services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql-server
    environment:
      SA_PASSWORD_FILE: /run/secrets/db_password
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    secrets:
      - db_password
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $(cat /run/secrets/db_password) -Q 'SELECT 1' -C -b -o /dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - sql-network
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - pg_password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    secrets:
      - pgadmin_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost/misc/ping || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  sqlserver_data:
    driver: local
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

secrets:
  db_password:
    environment: MSSQL_PASSWORD
  pg_password:
    environment: POSTGRES_PASSWORD
  pgadmin_password:
    environment: PGADMIN_PASSWORD

networks:
  sql-network:
    driver: bridge
